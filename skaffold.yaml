apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: level0

build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    - image: level0
      context: src/PlayersOnLevel0
      docker:
        dockerfile: PlayersOnLevel0.Api/Dockerfile
    - image: level0-web
      context: src/PlayersOnLevel0/PlayersOnLevel0.SPA.Web
      docker:
        dockerfile: Dockerfile
    - image: darkux
      context: src/DarkUxChallenge
      docker:
        dockerfile: DarkUxChallenge.Api/Dockerfile
    - image: darkux-web
      context: src/DarkUxChallenge/DarkUxChallenge.SPA.Web
      docker:
        dockerfile: Dockerfile
    - image: helloagents
      context: src/HelloAgents
      docker:
        dockerfile: HelloAgents.Api/Dockerfile
    - image: helloagents-web
      context: src/HelloAgents/HelloAgents.Web
      docker:
        dockerfile: Dockerfile
    - image: graphorleons
      context: src/GraphOrleons
      docker:
        dockerfile: GraphOrleons.Api/Dockerfile
    - image: graphorleons-web
      context: src/GraphOrleons/GraphOrleons.Web
      docker:
        dockerfile: Dockerfile

deploy:
  kustomize:
    paths:
      - clusters/minikube/apps

portForward:
  - resourceType: service
    resourceName: envoy-gateway
    namespace: envoy-gateway-system
    port: 80
    localPort: 8080
  - resourceType: service
    resourceName: cosmos-emulator
    namespace: level0
    port: 1234
    localPort: 1234
