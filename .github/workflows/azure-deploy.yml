name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        default: dev
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Select param file for environment
        run: |
          if [ -f "infra/main.${{ inputs.environment }}.bicepparam" ]; then
            cp infra/main.${{ inputs.environment }}.bicepparam infra/main.bicepparam
          fi
          # dev uses main.bicepparam as-is (already set to dev)

      - name: Provision infrastructure
        run: |
          az stack sub create \
            --name "${{ vars.AZURE_ENV_NAME }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --action-on-unmanage detachAll \
            --deny-settings-mode none \
            --yes
