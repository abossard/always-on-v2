name: App Build & Push (Reusable)

# Reusable workflow for building, pushing multi-arch container images,
# and updating K8s manifests. Builds amd64 and arm64 natively in parallel
# on architecture-specific runners (no QEMU emulation).
#
# Usage:
#   jobs:
#     build-push:
#       uses: ./.github/workflows/app-build-push.yml
#       with:
#         app_name: level0
#         docker_context: src/PlayersOnLevel0
#         dockerfile: src/PlayersOnLevel0/PlayersOnLevel0.Api/Dockerfile
#         deploy_manifest: clusters/base/apps/level0/deployment.yaml
#       secrets: inherit

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Short app name (used for image name and cache scope)'
        required: true
        type: string
      docker_context:
        description: 'Docker build context path'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      deploy_manifest:
        description: 'Path to K8s deployment.yaml to update with new image tag'
        required: true
        type: string
      extra_images:
        description: 'JSON array of extra images to build: [{"name":"level0-web","context":"...","dockerfile":"..."}]'
        required: false
        type: string
        default: '[]'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: Resolve ACR + generate tag (shared by build jobs) ──
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      acr_name: ${{ steps.acr.outputs.name }}
      acr_login_server: ${{ steps.acr.outputs.login_server }}
      tag: ${{ steps.tag.outputs.ts }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR from deployment outputs
        id: acr
        run: |
          set -euo pipefail
          ENV_NAME="${{ vars.AZURE_ENV_NAME }}"
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?starts_with(name, '${ENV_NAME}') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful Azure deployment found for env '${ENV_NAME}'. Run 'azd provision' first."
            exit 1
          fi
          ACR_LOGIN_SERVER=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.acrLoginServer.value" -o tsv 2>/dev/null || true)
          if [ -z "$ACR_LOGIN_SERVER" ] || [ "$ACR_LOGIN_SERVER" = "None" ]; then
            echo "::error::Deployment '$DEPLOYMENT_NAME' is missing the 'acrLoginServer' output."
            exit 1
          fi
          ACR_NAME=$(echo "$ACR_LOGIN_SERVER" | cut -d. -f1)
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Generate timestamp tag
        id: tag
        run: echo "ts=$(date +%s)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  # ── Step 2: Build each arch natively in parallel ──
  build:
    name: Build ${{ inputs.app_name }} (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login -n ${{ needs.prepare.outputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push primary image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ needs.prepare.outputs.acr_login_server }}/${{ inputs.app_name }}:${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ inputs.app_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app_name }}-${{ matrix.arch }}
          provenance: false

      - name: Build and push extra images
        if: inputs.extra_images != '[]'
        run: |
          set -euo pipefail
          echo '${{ inputs.extra_images }}' | jq -c '.[]' | while read -r img; do
            NAME=$(echo "$img" | jq -r '.name')
            CTX=$(echo "$img" | jq -r '.context')
            DF=$(echo "$img" | jq -r '.dockerfile')
            TAG="${{ needs.prepare.outputs.tag }}"
            SERVER="${{ needs.prepare.outputs.acr_login_server }}"
            ARCH="${{ matrix.arch }}"

            echo "Building $NAME ($ARCH) from $CTX ($DF)..."
            docker buildx build \
              --file "$DF" \
              --platform "${{ matrix.platform }}" \
              --tag "$SERVER/$NAME:$TAG-$ARCH" \
              --cache-from "type=gha,scope=$NAME-$ARCH" \
              --cache-to "type=gha,mode=max,scope=$NAME-$ARCH" \
              --push \
              "$CTX"
          done

  # ── Step 3: Create multi-arch manifest lists + update K8s ──
  manifest:
    name: Create manifests & deploy
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login -n ${{ needs.prepare.outputs.acr_name }}

      - name: Create multi-arch manifests for primary image
        env:
          SERVER: ${{ needs.prepare.outputs.acr_login_server }}
          APP: ${{ inputs.app_name }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          for FINAL_TAG in "$TAG" "${{ github.sha }}" "latest"; do
            docker manifest create "$SERVER/$APP:$FINAL_TAG" \
              "$SERVER/$APP:$TAG-amd64" \
              "$SERVER/$APP:$TAG-arm64"
            docker manifest push "$SERVER/$APP:$FINAL_TAG"
          done

      - name: Create multi-arch manifests for extra images
        if: inputs.extra_images != '[]'
        env:
          SERVER: ${{ needs.prepare.outputs.acr_login_server }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          echo '${{ inputs.extra_images }}' | jq -c '.[]' | while read -r img; do
            NAME=$(echo "$img" | jq -r '.name')
            for FINAL_TAG in "$TAG" "${{ github.sha }}" "latest"; do
              docker manifest create "$SERVER/$NAME:$FINAL_TAG" \
                "$SERVER/$NAME:$TAG-amd64" \
                "$SERVER/$NAME:$TAG-arm64"
              docker manifest push "$SERVER/$NAME:$FINAL_TAG"
            done
          done

      - name: Update K8s manifests with new image tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          DEPLOY: ${{ inputs.deploy_manifest }}
          APP_NAME: ${{ inputs.app_name }}
        run: |
          set -euo pipefail
          yq -i "(select(.kind == \"Deployment\") | .spec.template.spec.containers[0].image) |= sub(\":[^:]*$\", \":${TAG}\")" "$DEPLOY"

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$DEPLOY"
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ${APP_NAME} images to ${TAG} [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Manifest updated to ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No manifest changes needed" >> "$GITHUB_STEP_SUMMARY"
          fi
