name: App Build & Push (Reusable)

# Reusable workflow for building and pushing multi-arch container images
# using docker buildx bake (QEMU for arm64), then updating K8s manifests.
#
# Usage:
#   jobs:
#     build-push:
#       uses: ./.github/workflows/app-build-push.yml
#       with:
#         app_name: darkux
#         bake_source: src/DarkUxChallenge
#         deploy_manifest: clusters/base/apps/darkux/deployment.yaml
#       secrets: inherit

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Short app name (used for image name and cache scope)'
        required: true
        type: string
      bake_source:
        description: 'Path to directory containing docker-bake.hcl'
        required: true
        type: string
      deploy_manifest:
        description: 'Path to K8s deployment.yaml to update with new image tag'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: Resolve ACR + generate tag ──
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      acr_name: ${{ steps.acr.outputs.name }}
      acr_login_server: ${{ steps.acr.outputs.login_server }}
      tag: ${{ steps.tag.outputs.ts }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR from deployment outputs
        id: acr
        run: |
          set -euo pipefail
          ENV_NAME="${{ vars.AZURE_ENV_NAME }}"
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?starts_with(name, '${ENV_NAME}') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful Azure deployment found for env '${ENV_NAME}'. Run infrastructure provisioning first."
            exit 1
          fi
          ACR_LOGIN_SERVER=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.acrLoginServer.value" -o tsv 2>/dev/null || true)
          if [ -z "$ACR_LOGIN_SERVER" ] || [ "$ACR_LOGIN_SERVER" = "None" ]; then
            echo "::error::Deployment '$DEPLOYMENT_NAME' is missing the 'acrLoginServer' output."
            exit 1
          fi
          ACR_NAME=$(echo "$ACR_LOGIN_SERVER" | cut -d. -f1)
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Generate timestamp tag
        id: tag
        run: echo "ts=$(date +%s)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  # ── Step 2: Build all images (multi-arch via QEMU) + update K8s ──
  build-deploy:
    name: Build & Deploy ${{ inputs.app_name }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login -n ${{ needs.prepare.outputs.acr_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images
        uses: docker/bake-action@v7
        with:
          source: ./${{ inputs.bake_source }}
          push: true
          provenance: false
        env:
          REGISTRY: ${{ needs.prepare.outputs.acr_login_server }}
          TAG: ${{ needs.prepare.outputs.tag }}

      - name: Update K8s manifests with new image tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          DEPLOY: ${{ inputs.deploy_manifest }}
          APP_NAME: ${{ inputs.app_name }}
        run: |
          set -euo pipefail
          yq -i "(select(.kind == \"Deployment\") | .spec.template.spec.containers[0].image) |= sub(\":[^:]*$\", \":${TAG}\")" "$DEPLOY"

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$DEPLOY"
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ${APP_NAME} images to ${TAG} [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Manifest updated to ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No manifest changes needed" >> "$GITHUB_STEP_SUMMARY"
          fi
