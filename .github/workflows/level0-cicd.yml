name: Level0 CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/PlayersOnLevel0/**'
      - '.github/workflows/level0-cicd.yml'
      - '.github/workflows/app-cicd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/PlayersOnLevel0/**'
      - '.github/workflows/level0-cicd.yml'
      - '.github/workflows/app-cicd.yml'
  workflow_dispatch:

concurrency:
  group: level0-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

jobs:
  cicd:
    uses: ./.github/workflows/app-cicd.yml
    with:
      app-name: level0
      app-path: src/PlayersOnLevel0
      dockerfile: src/PlayersOnLevel0/PlayersOnLevel0.Api/Dockerfile
      test-project: PlayersOnLevel0.Tests
      run-e2e: false
      acr-name: ${{ vars.ACR_NAME }}
      acr-login-server: ${{ vars.ACR_LOGIN_SERVER }}
    secrets: inherit
