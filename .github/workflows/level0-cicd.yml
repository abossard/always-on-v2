name: Level0 CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/PlayersOnLevel0/**'
      - '.github/workflows/level0-cicd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/PlayersOnLevel0/**'
      - '.github/workflows/level0-cicd.yml'
  workflow_dispatch:

concurrency:
  group: level0-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  unit-and-integration:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/PlayersOnLevel0
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/PlayersOnLevel0
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run tests with coverage
        run: >
          dotnet run --project PlayersOnLevel0.Tests --no-build --
          --report-trx --report-trx-filename results.trx
          --coverage --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/coverage.cobertura.xml
          --treenode-filter "/*/*/*/*[Category!=e2e]"
        working-directory: src/PlayersOnLevel0
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/PlayersOnLevel0/**/TestResults/**/*.trx
          check_name: Level0 Test Results
      - name: Publish coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
      - name: Add coverage to summary
        if: always()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          retention-days: 5
          path: |
            src/PlayersOnLevel0/**/TestResults/

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Install SPA dependencies
        run: npm ci --legacy-peer-deps
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.SPA.Web
      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.E2E
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run E2E tests via Aspire
        run: >
          dotnet run --project PlayersOnLevel0.Tests --
          --treenode-filter "/*/*/*/*[Category=e2e]"
        working-directory: src/PlayersOnLevel0
      - name: Playwright report summary
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: src/PlayersOnLevel0/PlayersOnLevel0.E2E/results.json
          job-summary: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          retention-days: 5
          path: |
            src/PlayersOnLevel0/PlayersOnLevel0.E2E/playwright-report/
            src/PlayersOnLevel0/PlayersOnLevel0.E2E/test-results/

  docker-build-push:
    name: Build & Push Container Image
    needs: [unit-and-integration, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: level0
      docker_context: src/PlayersOnLevel0
      dockerfile: src/PlayersOnLevel0/PlayersOnLevel0.Api/Dockerfile
      deploy_manifest: clusters/base/apps/level0/deployment.yaml
      extra_images: '[{"name":"level0-web","context":"src/PlayersOnLevel0/PlayersOnLevel0.SPA.Web","dockerfile":"src/PlayersOnLevel0/PlayersOnLevel0.SPA.Web/Dockerfile"}]'
    secrets: inherit
