name: HelloOrleons CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/HelloOrleons/**'
      - '.github/workflows/helloorleons-cicd.yml'
      - '.github/workflows/app-build-push.yml'
      - '.github/workflows/app-verify-deploy.yml'
      - '.github/workflows/app-e2e-aspire.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/HelloOrleons/**'
      - '.github/workflows/helloorleons-cicd.yml'
      - '.github/workflows/app-build-push.yml'
      - '.github/workflows/app-verify-deploy.yml'
      - '.github/workflows/app-e2e-aspire.yml'
  workflow_dispatch:

concurrency:
  group: helloorleons-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/HelloOrleons
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/HelloOrleons
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Trust ASP.NET Core dev certificate
        run: |
          dotnet dev-certs https --trust || true
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/usr/lib/ssl/certs" >> $GITHUB_ENV
      - name: Run tests
        run: |
          dotnet run --project HelloOrleons.Tests --no-build -- \
            --report-trx --report-trx-filename results.trx
        working-directory: src/HelloOrleons
      - name: Collect Docker diagnostics
        if: always()
        run: |
          echo "## 🐳 Docker Container Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker ps -a 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/HelloOrleons/**/TestResults/**/*.trx
          check_name: HelloOrleons Test Results

  e2e:
    name: Playwright E2E Tests
    uses: ./.github/workflows/app-e2e-aspire.yml
    with:
      working_dir: src/HelloOrleons
      apphost_project: HelloOrleons.AppHost
      e2e_dir: src/HelloOrleons/HelloOrleons.E2E
      wait_resources: 'api'
    secrets: inherit

  docker-build-push:
    name: Build & Push Container Image
    needs: [build-and-test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: helloorleons
      docker_context: src/HelloOrleons
      dockerfile: src/HelloOrleons/HelloOrleons.Api/Dockerfile
      deploy_manifest: clusters/base/apps/helloorleons/deployment.yaml
    secrets: inherit

  verify-deployment:
    name: Verify Flux Deployment
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-verify-deploy.yml
    with:
      production_url: https://hello.alwayson.actor
      e2e_dir: src/HelloOrleons/HelloOrleons.E2E
    secrets: inherit

  load-test:
    name: Azure Load Test
    needs: [verify-deployment]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: src/HelloOrleons/HelloOrleons.LoadTest/helloorleons-loadtest.yaml
          loadTestResource: lt-alwayson
          resourceGroup: rg-alwayson-global
          env: |
            [
              {
                "name": "LOCUST_HOST",
                "value": "https://hello.alwayson.actor"
              },
              {
                "name": "LOCUST_USERS",
                "value": "1000"
              },
              {
                "name": "LOCUST_SPAWN_RATE",
                "value": "100"
              },
              {
                "name": "LOCUST_RUN_TIME",
                "value": "60s"
              }
            ]

      - name: Upload Load Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-load-test-results
          retention-days: 14
          path: ${{ github.workspace }}/loadTest
