name: HelloOrleons CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/HelloOrleons/**'
      - '.github/workflows/helloorleons-cicd.yml'
      - '.github/workflows/app-build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/HelloOrleons/**'
      - '.github/workflows/helloorleons-cicd.yml'
      - '.github/workflows/app-build-push.yml'
  workflow_dispatch:

concurrency:
  group: helloorleons-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/HelloOrleons
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/HelloOrleons
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run tests
        run: |
          for attempt in 1 2 3; do
            echo "=== Test attempt $attempt ==="
            dotnet run --project HelloOrleons.Tests --no-build -- \
              --report-trx --report-trx-filename results.trx \
              && break
            echo "Attempt $attempt failed, retrying..."
          done
        working-directory: src/HelloOrleons
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/HelloOrleons/**/TestResults/**/*.trx
          check_name: HelloOrleons Test Results

  docker-build-push:
    name: Build & Push Container Image
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: helloorleons
      docker_context: src/HelloOrleons
      dockerfile: src/HelloOrleons/HelloOrleons.Api/Dockerfile
      deploy_manifest: clusters/base/apps/helloorleons/deployment.yaml
    secrets: inherit
