name: DarkUX Challenge CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/DarkUxChallenge/**'
      - '.github/workflows/darkux-cicd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/DarkUxChallenge/**'
      - '.github/workflows/darkux-cicd.yml'
  workflow_dispatch:

concurrency:
  group: darkux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  unit-and-integration:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/DarkUxChallenge
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/DarkUxChallenge
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run tests with coverage
        run: >
          dotnet run --project DarkUxChallenge.Tests --no-build --
          --report-trx --report-trx-filename results.trx
          --coverage --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/coverage.cobertura.xml
          --retry-failed-tests 3
        working-directory: src/DarkUxChallenge
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/DarkUxChallenge/**/TestResults/**/*.trx
          check_name: DarkUX Test Results
      - name: Publish coverage summary
        if: always()
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
      - name: Add coverage to summary
        if: always()
        continue-on-error: true
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          retention-days: 5
          path: |
            src/DarkUxChallenge/**/TestResults/

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Install SPA dependencies
        run: npm ci --legacy-peer-deps
        working-directory: src/DarkUxChallenge/DarkUxChallenge.SPA.Web
      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/DarkUxChallenge/DarkUxChallenge.E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/DarkUxChallenge/DarkUxChallenge.E2E
      - name: Build .NET projects
        run: dotnet build
        working-directory: src/DarkUxChallenge
      - name: Start Aspire AppHost
        run: dotnet run --project DarkUxChallenge.AppHost --no-build &
        working-directory: src/DarkUxChallenge
      - name: Wait for API to be healthy
        run: npx wait-on http://localhost:5199/health --timeout 120000
      - name: Wait for SPA to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4200 2>/dev/null; then
              echo "SPA ready"
              exit 0
            fi
            sleep 2
          done
          echo "SPA failed to start" && exit 1
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: src/DarkUxChallenge/DarkUxChallenge.E2E
        env:
          services__web__http__0: http://localhost:4200
      - name: Playwright report summary
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: src/DarkUxChallenge/DarkUxChallenge.E2E/test-results/results.json
          job-summary: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          retention-days: 5
          path: |
            src/DarkUxChallenge/DarkUxChallenge.E2E/playwright-report/
            src/DarkUxChallenge/DarkUxChallenge.E2E/test-results/

  docker-build-push:
    name: Build & Push Container Image
    needs: [unit-and-integration, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: darkux
      docker_context: src/DarkUxChallenge
      dockerfile: src/DarkUxChallenge/DarkUxChallenge.Api/Dockerfile
      deploy_manifest: clusters/base/apps/darkux/deployment.yaml
      extra_images: '[{"name":"darkux-web","context":"src/DarkUxChallenge/DarkUxChallenge.SPA.Web","dockerfile":"src/DarkUxChallenge/DarkUxChallenge.SPA.Web/Dockerfile"}]'
    secrets: inherit
