name: HelloAgents CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/HelloAgents/**'
      - '.github/workflows/helloagents-cicd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/HelloAgents/**'
      - '.github/workflows/helloagents-cicd.yml'
  workflow_dispatch:

concurrency:
  group: helloagents-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve AI Services endpoint from last deployment
        id: ai
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          ENDPOINT=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.aiServicesEndpoint.value" -o tsv)
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "AI Services endpoint: $ENDPOINT"
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/HelloAgents
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/HelloAgents
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Trust ASP.NET Core dev certificate
        run: |
          dotnet dev-certs https --trust || true
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/usr/lib/ssl/certs" >> $GITHUB_ENV
      - name: Run tests
        run: |
          dotnet run --project HelloAgents.Tests --no-build -- \
            --report-trx --report-trx-filename results.trx
        working-directory: src/HelloAgents
        env:
          AZURE_OPENAI_ENDPOINT: ${{ steps.ai.outputs.endpoint }}
          AZURE_OPENAI_DEPLOYMENT_NAME: gpt-41-mini
      - name: Collect Docker diagnostics
        if: always()
        run: |
          echo "## 🐳 Docker Container Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker ps -a 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for cid in $(docker ps -aq); do
            CNAME=$(docker inspect --format '{{.Name}}' "$cid" 2>&1)
            echo "### Container: $CNAME" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            docker logs --tail 80 "$cid" 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/HelloAgents/**/TestResults/**/*.trx
          check_name: HelloAgents Test Results

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve AI Services endpoint from last deployment
        id: ai
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          ENDPOINT=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.aiServicesEndpoint.value" -o tsv)
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "AI Services endpoint: $ENDPOINT"
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Install Aspire CLI
        run: |
          dotnet tool install -g Aspire.Cli
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - name: Install Web dependencies
        run: npm ci
        working-directory: src/HelloAgents/HelloAgents.Web
      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Build .NET projects
        run: dotnet build
        working-directory: src/HelloAgents
      - name: Start Aspire AppHost
        run: aspire start --apphost HelloAgents.AppHost.Local --non-interactive --nologo
        working-directory: src/HelloAgents
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
          AZURE_OPENAI_ENDPOINT: ${{ steps.ai.outputs.endpoint }}
          AZURE_OPENAI_DEPLOYMENT_NAME: gpt-41-mini
      - name: Wait for services
        run: |
          aspire wait api --timeout 120 --non-interactive --nologo
          aspire wait web --timeout 120 --non-interactive --nologo
          aspire describe --non-interactive --nologo
        working-directory: src/HelloAgents
      - name: Run Playwright E2E via Aspire
        run: |
          aspire resource e2e start --non-interactive --nologo
          aspire wait e2e --status down --timeout 300 --non-interactive --nologo
        working-directory: src/HelloAgents
      - name: Collect E2E logs on failure
        if: failure()
        run: aspire logs e2e --non-interactive --nologo --tail 200 || true
        working-directory: src/HelloAgents
      - name: Stop Aspire
        if: always()
        run: aspire stop --non-interactive --nologo || true
        working-directory: src/HelloAgents
      - name: Playwright report summary
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: src/HelloAgents/HelloAgents.E2E/test-results/results.json
          job-summary: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-local
          retention-days: 5
          path: |
            src/HelloAgents/HelloAgents.E2E/playwright-report/
            src/HelloAgents/HelloAgents.E2E/test-results/

  docker-build-push:
    name: Build & Push Container Image
    needs: [build-and-test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: helloagents
      docker_context: src/HelloAgents
      dockerfile: src/HelloAgents/HelloAgents.Api/Dockerfile
      deploy_manifest: clusters/base/apps/helloagents/deployment.yaml
      extra_images: '[{"name":"helloagents-web","context":"src/HelloAgents/HelloAgents.Web","dockerfile":"src/HelloAgents/HelloAgents.Web/Dockerfile"}]'
    secrets: inherit

  verify-deployment:
    name: Verify Flux Deployment
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Install k8s-configuration extension
        run: az extension add --name k8s-configuration --yes
      - name: Wait for Flux compliance (up to 1 hour)
        run: |
          set -euo pipefail
          echo "## 🚀 Flux Deployment Verification" >> $GITHUB_STEP_SUMMARY

          CLUSTERS=$(az aks list --query "[].{name:name, rg:resourceGroup}" -o json)
          COUNT=$(echo "$CLUSTERS" | jq length)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No AKS clusters found" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Found $COUNT cluster(s): $(echo "$CLUSTERS" | jq -r '.[].name' | tr '\n' ', ')"

          CHECKED=0
          for row in $(echo "$CLUSTERS" | jq -c '.[]'); do
            NAME=$(echo "$row" | jq -r '.name')
            RG=$(echo "$row" | jq -r '.rg')
            echo "" | tee -a $GITHUB_STEP_SUMMARY
            echo "### Cluster: $NAME (RG: $RG)" | tee -a $GITHUB_STEP_SUMMARY

            # Skip clusters without flux config (e.g. Fleet hub)
            if ! az k8s-configuration flux show \
              --resource-group "$RG" --cluster-name "$NAME" \
              --cluster-type managedClusters --name cluster-config \
              --query "name" -o tsv 2>&1; then
              echo "⏭️ No Flux config — skipping" | tee -a $GITHUB_STEP_SUMMARY
              continue
            fi
            CHECKED=$((CHECKED + 1))

            # Poll every 60s for up to 60 attempts (1 hour)
            for i in $(seq 1 60); do
              FLUX_JSON=$(az k8s-configuration flux show \
                --resource-group "$RG" --cluster-name "$NAME" \
                --cluster-type managedClusters --name cluster-config \
                -o json 2>&1)

              STATE=$(echo "$FLUX_JSON" | jq -r '.complianceState // "unknown"')
              COMMIT=$(echo "$FLUX_JSON" | jq -r '.sourceSyncedCommitId // "unknown"')

              # Per-kustomization status summary
              KUST_SUMMARY=$(echo "$FLUX_JSON" | jq -r '
                [.statuses[] | select(.kind == "Kustomization") | "\(.name): \(.complianceState)"]
                | join(", ")' 2>/dev/null || echo "unavailable")

              echo "  [$i/60] $(date -u +%H:%M:%S) — $STATE | commit: ${COMMIT##*:} | kustomizations: $KUST_SUMMARY"
              echo "| $i | $(date -u +%H:%M:%S) | $STATE | ${COMMIT##*:} | $KUST_SUMMARY |" >> $GITHUB_STEP_SUMMARY

              # SUCCESS: all compliant
              if [ "$STATE" = "Compliant" ]; then
                echo "" | tee -a $GITHUB_STEP_SUMMARY
                echo "✅ **Cluster $NAME: Compliant** after ~${i} min" | tee -a $GITHUB_STEP_SUMMARY
                echo "Commit: $COMMIT" | tee -a $GITHUB_STEP_SUMMARY
                break
              fi

              # FAIL FAST: check for error states in individual kustomizations
              ERRORS=$(echo "$FLUX_JSON" | jq -r '
                [.statuses[] | select(.complianceState == "Failed" or .complianceState == "Error") | .name]
                | join(", ")' 2>/dev/null || echo "")
              if [ -n "$ERRORS" ]; then
                echo "" | tee -a $GITHUB_STEP_SUMMARY
                echo "❌ **Cluster $NAME: Kustomizations in error: $ERRORS**" | tee -a $GITHUB_STEP_SUMMARY
                echo '```json' >> $GITHUB_STEP_SUMMARY
                echo "$FLUX_JSON" | jq '.statuses[] | select(.complianceState == "Failed" or .complianceState == "Error")' >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                exit 1
              fi

              # TIMEOUT
              if [ "$i" -eq 60 ]; then
                echo "" | tee -a $GITHUB_STEP_SUMMARY
                echo "❌ **Cluster $NAME: Not compliant after 1 hour (state: $STATE)**" | tee -a $GITHUB_STEP_SUMMARY
                echo '```json' >> $GITHUB_STEP_SUMMARY
                echo "$FLUX_JSON" | jq '.' >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                exit 1
              fi

              sleep 60
            done
          done

          if [ "$CHECKED" -eq 0 ]; then
            echo "❌ No clusters have Flux config 'cluster-config'" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi
      - name: Health check production
        run: |
          curl -sf --max-time 10 https://agents.alwayson.actor/health \
            && echo "✅ Production healthy" | tee -a $GITHUB_STEP_SUMMARY \
            || { echo "❌ Production health check failed" | tee -a $GITHUB_STEP_SUMMARY; exit 1; }

  production-smoke:
    name: Production Smoke Tests
    needs: [verify-deployment]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Run production smoke tests
        run: npx playwright test --project=production
        working-directory: src/HelloAgents/HelloAgents.E2E
        env:
          PRODUCTION_URL: https://agents.alwayson.actor
          PRODUCTION_API_URL: https://agents.alwayson.actor
      - name: Playwright report summary
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: src/HelloAgents/HelloAgents.E2E/test-results/results.json
          job-summary: true
      - name: Upload production smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production
          retention-days: 5
          path: |
            src/HelloAgents/HelloAgents.E2E/playwright-report/
            src/HelloAgents/HelloAgents.E2E/test-results/
