name: HelloAgents CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/HelloAgents/**'
      - '.github/workflows/helloagents-cicd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/HelloAgents/**'
      - '.github/workflows/helloagents-cicd.yml'
  workflow_dispatch:

concurrency:
  group: helloagents-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve AI Services endpoint from last deployment
        id: ai
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          ENDPOINT=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.aiServicesEndpoint.value" -o tsv)
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "AI Services endpoint: $ENDPOINT"
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: src/HelloAgents
      - name: Build
        run: dotnet build --no-restore
        working-directory: src/HelloAgents
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run tests
        run: >
          dotnet run --project HelloAgents.Tests --no-build --
          --report-trx --report-trx-filename results.trx
        working-directory: src/HelloAgents
        env:
          AZURE_OPENAI_ENDPOINT: ${{ steps.ai.outputs.endpoint }}
          AZURE_OPENAI_DEPLOYMENT_NAME: gpt-41-mini
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/HelloAgents/**/TestResults/**/*.trx
          check_name: HelloAgents Test Results

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve AI Services endpoint from last deployment
        id: ai
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          ENDPOINT=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.aiServicesEndpoint.value" -o tsv)
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "AI Services endpoint: $ENDPOINT"
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Install Web dependencies
        run: npm ci
        working-directory: src/HelloAgents/HelloAgents.Web
      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/HelloAgents/HelloAgents.E2E
      - name: Build .NET projects
        run: dotnet build
        working-directory: src/HelloAgents
      - name: Start Aspire AppHost
        run: dotnet run --project HelloAgents.AppHost --no-build &
        working-directory: src/HelloAgents
        env:
          AZURE_OPENAI_ENDPOINT: ${{ steps.ai.outputs.endpoint }}
          AZURE_OPENAI_DEPLOYMENT_NAME: gpt-41-mini
      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5100/health 2>/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start" && exit 1
      - name: Wait for SPA to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4200 2>/dev/null; then
              echo "SPA ready"
              exit 0
            fi
            sleep 2
          done
          echo "SPA failed to start" && exit 1
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: src/HelloAgents/HelloAgents.E2E
        env:
          services__web__http__0: http://localhost:4200
      - name: Playwright report summary
        if: always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: src/HelloAgents/HelloAgents.E2E/test-results/results.json
          job-summary: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          retention-days: 5
          path: |
            src/HelloAgents/HelloAgents.E2E/playwright-report/
            src/HelloAgents/HelloAgents.E2E/test-results/

  docker-build-push:
    name: Build & Push Container Image
    needs: [build-and-test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/app-build-push.yml
    with:
      app_name: helloagents
      docker_context: src/HelloAgents
      dockerfile: src/HelloAgents/HelloAgents.Api/Dockerfile
      deploy_manifest: clusters/base/apps/helloagents/deployment.yaml
      extra_images: '[{"name":"helloagents-web","context":"src/HelloAgents/HelloAgents.Web","dockerfile":"src/HelloAgents/HelloAgents.Web/Dockerfile"}]'
    secrets: inherit
