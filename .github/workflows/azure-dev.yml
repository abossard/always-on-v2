name: Provision & Deploy

on:
  workflow_dispatch:
    inputs:
      force-provision:
        description: 'Force provision even if no template changes (corrects drift)'
        type: boolean
        default: false
  schedule:
    - cron: '0 5 * * *'  # 5:00 UTC = 6:00 CET — re-enables public endpoints after nightly policy
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'infra_tenant/**'
      - 'azure.yaml'
      - '.github/workflows/azure-dev.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Log in Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Infrastructure
        id: provision
        run: |
          ARGS="--no-prompt"
          # Force --no-state on scheduled runs (drift correction) or manual trigger with force
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.force-provision }}" == "true" ]]; then
            ARGS="$ARGS --no-state"
          fi
          azd provision $ARGS

      - name: Enable Managed Gateway API on AKS clusters
        if: steps.provision.outcome == 'success'
        run: |
          set -euo pipefail

          az extension add --name aks-preview --upgrade --allow-preview true 2>/dev/null || true

          ENV_NAME="${AZURE_ENV_NAME:-alwayson}"
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)

          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::warning::No successful deployment found — skipping Gateway API enablement"
            exit 0
          fi

          CLUSTER_NAMES=$(az deployment sub show \
            --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.aksClusterNames.value" \
            -o json 2>/dev/null || echo "[]")

          echo "$CLUSTER_NAMES" | jq -r '.[]' | while read -r CLUSTER; do
            RG="rg-${CLUSTER#aks-}"

            # Check if Gateway API is already enabled
            GW_STATUS=$(az aks show --resource-group "$RG" --name "$CLUSTER" \
              --query "ingressProfile.gatewayApi.installation" -o tsv 2>/dev/null || echo "")

            if [ "$GW_STATUS" = "Standard" ]; then
              echo "✅ Gateway API already enabled on $CLUSTER — skipping"
              continue
            fi

            echo "Enabling Gateway API on $CLUSTER in $RG..."
            az aks update --resource-group "$RG" --name "$CLUSTER" --enable-gateway-api --only-show-errors 2>&1 || \
              echo "::warning::Gateway API enablement failed for $CLUSTER"
          done

          echo "✅ Managed Gateway API check complete" | tee -a $GITHUB_STEP_SUMMARY

      - name: Register Flux SSH deploy keys
        if: steps.provision.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_KEY_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          # Skip if no PAT configured for deploy key management
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::DEPLOY_KEY_ADMIN_TOKEN secret not set — printing keys for manual registration"

            # Still try to read keys from deployment outputs for display
            ENV_NAME=$(azd env get-value AZURE_ENV_NAME 2>/dev/null || echo "always-on-v2")
            DEPLOYMENT_NAME=$(az deployment sub list \
              --query "[?starts_with(name, '${ENV_NAME}') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
              -o tsv 2>/dev/null || echo "")

            if [ -n "$DEPLOYMENT_NAME" ]; then
              FLUX_KEYS=$(az deployment sub show \
                --name "$DEPLOYMENT_NAME" \
                --query "properties.outputs.fluxSshPublicKeys.value" \
                -o json 2>/dev/null || echo "[]")

              echo "## 🔑 Flux SSH Public Keys" >> $GITHUB_STEP_SUMMARY
              echo "Add these as **read-only deploy keys** at:" >> $GITHUB_STEP_SUMMARY
              echo "https://github.com/${{ github.repository }}/settings/keys" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              echo "$FLUX_KEYS" | jq -c '.[]' 2>/dev/null | while read -r entry; do
                STAMP=$(echo "$entry" | jq -r '.stampName')
                PUB_KEY=$(echo "$entry" | jq -r '.sshPublicKey')
                echo "### flux-${STAMP}" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "$PUB_KEY" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              done
            fi
            exit 0
          fi

          # Get the deployment name from azd environment
          ENV_NAME=$(azd env get-value AZURE_ENV_NAME 2>/dev/null || echo "always-on-v2")

          # Find the latest successful subscription-level deployment
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?starts_with(name, '${ENV_NAME}') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)

          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::warning::No successful deployment found — skipping deploy key registration"
            exit 0
          fi

          echo "Reading Flux SSH public keys from deployment: $DEPLOYMENT_NAME"

          FLUX_KEYS=$(az deployment sub show \
            --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.fluxSshPublicKeys.value" \
            -o json 2>/dev/null || echo "[]")

          if [ "$FLUX_KEYS" = "[]" ] || [ "$FLUX_KEYS" = "null" ]; then
            echo "::warning::No Flux SSH public keys found in deployment outputs"
            exit 0
          fi

          EXISTING_KEYS=$(gh api repos/${{ github.repository }}/keys --jq '.[].title' 2>/dev/null || echo "")

          echo "$FLUX_KEYS" | jq -c '.[]' | while read -r entry; do
            STAMP=$(echo "$entry" | jq -r '.stampName')
            PUB_KEY=$(echo "$entry" | jq -r '.sshPublicKey')
            KEY_TITLE="flux-${STAMP}"

            if [ -z "$PUB_KEY" ] || [ "$PUB_KEY" = "null" ]; then
              echo "::warning::Empty SSH key for stamp $STAMP — skipping"
              continue
            fi

            # Remove existing key with same title to allow update
            if echo "$EXISTING_KEYS" | grep -qF "$KEY_TITLE"; then
              echo "Removing existing deploy key: $KEY_TITLE"
              KEY_ID=$(gh api repos/${{ github.repository }}/keys --jq ".[] | select(.title==\"${KEY_TITLE}\") | .id")
              if [ -n "$KEY_ID" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/keys/${KEY_ID}" || true
              fi
            fi

            # Also remove any existing key with the same SSH public key value (different title)
            KEY_PREFIX=$(echo "$PUB_KEY" | awk '{print $2}' | cut -c1-40)
            DUPE_ID=$(gh api repos/${{ github.repository }}/keys --jq ".[] | select(.key | contains(\"${KEY_PREFIX}\")) | .id")
            if [ -n "$DUPE_ID" ]; then
              echo "Removing duplicate deploy key (same public key, different title): $DUPE_ID"
              gh api -X DELETE "repos/${{ github.repository }}/keys/${DUPE_ID}" || true
            fi

            echo "Adding deploy key: $KEY_TITLE"
            gh api repos/${{ github.repository }}/keys \
              -f title="$KEY_TITLE" \
              -f key="$PUB_KEY" \
              -F read_only=true
          done

          echo "✅ Flux deploy keys registered" | tee -a $GITHUB_STEP_SUMMARY

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Display application endpoints
        if: steps.provision.outcome == 'success'
        run: |
          set -euo pipefail
          ENV_NAME="${AZURE_ENV_NAME:-alwayson}"
          DEPLOYMENT_NAME=$(az deployment sub list \
            --query "[?starts_with(name, '${ENV_NAME}') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv 2>/dev/null || echo "")

          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::warning::No deployment found — skipping endpoint display"
            exit 0
          fi

          ENDPOINTS=$(az deployment sub show --name "$DEPLOYMENT_NAME" \
            --query "properties.outputs.appEndpoints.value" -o json 2>/dev/null || echo "[]")

          if [ "$ENDPOINTS" = "[]" ] || [ "$ENDPOINTS" = "null" ]; then
            echo "ℹ️ No app endpoints in deployment outputs" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## 🌐 Application Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Front Door | Gateway Origins |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----------|-----------------|" >> $GITHUB_STEP_SUMMARY

          echo "$ENDPOINTS" | jq -c '.[]' | while read -r app; do
            NAME=$(echo "$app" | jq -r '.name')
            FD_URL=$(echo "$app" | jq -r '.frontDoorUrl')
            ORIGINS=$(echo "$app" | jq -r '[.stampOrigins[] | "https://\(.gatewayHostname)"] | join(", ")')
            echo "| ${NAME} | ${FD_URL} | ${ORIGINS} |" >> $GITHUB_STEP_SUMMARY
          done

