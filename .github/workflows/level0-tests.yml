name: Level0 Tests

on:
  push:
    branches: [main]
    paths: ['src/PlayersOnLevel0/**']
  pull_request:
    branches: [main]
    paths: ['src/PlayersOnLevel0/**']
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-and-integration:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore
        working-directory: src/PlayersOnLevel0

      - name: Build
        run: dotnet build --no-restore
        working-directory: src/PlayersOnLevel0

      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Run tests with coverage
        run: >
          dotnet run --project PlayersOnLevel0.Tests --no-build --
          --report-trx --report-trx-filename results.trx
          --coverage --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/coverage.cobertura.xml
        working-directory: src/PlayersOnLevel0

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: src/PlayersOnLevel0/**/TestResults/**/*.trx
          check_name: Level0 Test Results

      - name: Publish coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Add coverage to summary
        if: always()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            src/PlayersOnLevel0/**/TestResults/
            src/PlayersOnLevel0/TestResults/

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Install SPA dependencies
        run: npm ci --legacy-peer-deps
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.SPA.Web

      - name: Install E2E dependencies
        run: npm ci
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.E2E

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.E2E

      - name: Build .NET projects
        run: dotnet build
        working-directory: src/PlayersOnLevel0

      - name: Start Aspire AppHost
        run: dotnet run --project PlayersOnLevel0.AppHost --no-build &
        working-directory: src/PlayersOnLevel0

      - name: Wait for API to be healthy
        run: npx wait-on http://localhost:5036/health --timeout 120000

      - name: Find SPA port and wait for ready
        run: |
          for i in $(seq 1 60); do
            # Scan all listening ports for a Vite response (returns HTML with <div id="root">)
            for PORT in $(lsof -iTCP -sTCP:LISTEN -P -n 2>/dev/null | awk '{print $9}' | grep -oE '[0-9]+$' | sort -u); do
              if curl -sf "http://localhost:$PORT" 2>/dev/null | grep -q 'root' 2>/dev/null; then
                echo "SPA ready on port $PORT"
                echo "SPA_PORT=$PORT" >> $GITHUB_ENV
                exit 0
              fi
            done
            sleep 2
          done
          echo "=== Debug: all listening ports ==="
          lsof -iTCP -sTCP:LISTEN -P -n 2>/dev/null || true
          echo "SPA failed to start" && exit 1

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: src/PlayersOnLevel0/PlayersOnLevel0.E2E
        env:
          services__web__http__0: http://localhost:${{ env.SPA_PORT }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/PlayersOnLevel0/PlayersOnLevel0.E2E/playwright-report/
