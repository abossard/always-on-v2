name: Level0 Tests

on:
  push:
    branches: [main]
    paths: ['src/PlayersOnLevel0/**']
  pull_request:
    branches: [main]
    paths: ['src/PlayersOnLevel0/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore
        working-directory: src/PlayersOnLevel0

      - name: Build
        run: dotnet build --no-restore
        working-directory: src/PlayersOnLevel0

      - name: Run tests
        run: dotnet run --project PlayersOnLevel0.Tests --no-build
        working-directory: src/PlayersOnLevel0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/PlayersOnLevel0/TestResults/
