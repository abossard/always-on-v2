name: App CI/CD

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Application name (used for image tag, display)'
        required: true
        type: string
      app-path:
        description: 'Path to app source (e.g., src/PlayersOnLevel0)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      run-e2e:
        description: 'Whether to run E2E tests'
        required: false
        type: boolean
        default: false
      test-project:
        description: 'Path to test project (relative to app-path)'
        required: false
        type: string
        default: ''
      e2e-project:
        description: 'Path to E2E project (if run-e2e is true)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

jobs:
  unit-and-integration:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      - name: Restore
        run: dotnet restore
        working-directory: ${{ inputs.app-path }}
      - name: Build
        run: dotnet build --no-restore
        working-directory: ${{ inputs.app-path }}
      - name: Expose GitHub Actions runtime
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Run tests with coverage
        if: inputs.test-project != ''
        run: >
          dotnet run --project ${{ inputs.test-project }} --no-build --
          --report-trx --report-trx-filename results.trx
          --coverage --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/coverage.cobertura.xml
        working-directory: ${{ inputs.app-path }}
      - name: Publish test results
        if: always() && inputs.test-project != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ inputs.app-path }}/**/TestResults/**/*.trx
          check_name: ${{ inputs.app-name }} Test Results
      - name: Publish coverage summary
        if: always() && inputs.test-project != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
      - name: Add coverage to summary
        if: always() && inputs.test-project != ''
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app-name }}-test-results
          retention-days: 5
          path: |
            ${{ inputs.app-path }}/**/TestResults/

  e2e:
    name: Playwright E2E Tests
    if: inputs.run-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Aspire workload
        run: dotnet workload install aspire
      # E2E steps are app-specific — caller workflow handles via e2e-project input
      # For now, this is a placeholder that individual apps can extend
      - name: Build .NET projects
        run: dotnet build
        working-directory: ${{ inputs.app-path }}

  docker-build-push:
    name: Build & Push Container Image
    needs: [unit-and-integration]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: ACR Login
        run: az acr login -n ${{ vars.ACR_NAME }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.app-path }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.app-name }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ inputs.app-name }}:latest
          cache-from: type=gha,scope=${{ inputs.app-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app-name }}
          provenance: false
