name: always-on-v2
infra:
  provider: bicep
  path: ./infra
  module: main
  parameters:
    baseName: ${AZURE_ENV_NAME}
    globalLocation: ${AZURE_LOCATION}
  deploymentStacks:
    actionOnUnmanage:
      resources: detach
      resourceGroups: detach
    denySettings:
      mode: none
hooks:
  predeploy:
    shell: sh
    run: scripts/build-and-push.sh
