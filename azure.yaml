name: always-on-v2
infra:
  provider: bicep
  path: ./infra
  module: main
  parameters:
    baseName: ${AZURE_ENV_NAME}
    globalLocation: ${AZURE_LOCATION}
  deploymentStacks:
    actionOnUnmanage:
      resources: detach
      resourceGroups: detach
    denySettings:
      mode: none
hooks:
  postprovision:
    shell: sh
    run: |
      if [ "$CI" = "true" ] || [ "$GITHUB_ACTIONS" = "true" ]; then
        echo "Skipping build-and-push in CI — handled by app CI/CD workflows"
        exit 0
      fi
      scripts/build-and-push.sh
