apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmos-emulator
  namespace: level0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmos-emulator
  template:
    metadata:
      labels:
        app: cosmos-emulator
    spec:
      containers:
        - name: cosmos-emulator
          image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
          ports:
            - containerPort: 8081
              name: api
            - containerPort: 1234
              name: explorer
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cosmos-emulator
  namespace: level0
spec:
  selector:
    app: cosmos-emulator
  ports:
    - name: api
      port: 8081
      targetPort: 8081
    - name: explorer
      port: 1234
      targetPort: 1234
