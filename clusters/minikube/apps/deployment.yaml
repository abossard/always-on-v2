apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0
  namespace: level0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: level0
  template:
    metadata:
      labels:
        app: level0
    spec:
      containers:
        - name: level0
          image: level0:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: Storage__Provider
              value: InMemory
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0
  namespace: level0
spec:
  selector:
    app: level0
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0-web
  namespace: level0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: level0-web
  template:
    metadata:
      labels:
        app: level0-web
    spec:
      containers:
        - name: level0-web
          image: level0-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_FALLBACK_PAGE
              value: /public/index.html
            - name: SERVER_LOG_LEVEL
              value: info
            - name: SERVER_HEALTH
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0-web
  namespace: level0
spec:
  selector:
    app: level0-web
  ports:
    - port: 8080
      targetPort: 8080
