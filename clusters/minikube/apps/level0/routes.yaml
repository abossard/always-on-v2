apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: level0-api-route
  namespace: level0
spec:
  parentRefs:
    - name: app-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: level0
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: level0
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: level0-web-route
  namespace: level0
spec:
  parentRefs:
    - name: app-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: level0-web
          port: 8080
