apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: level0-gateway
  namespace: aks-istio-ingress
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
