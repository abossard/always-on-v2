apiVersion: v1
kind: Namespace
metadata:
  name: ${LEVEL0_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${LEVEL0_SA_NAME}
  namespace: ${LEVEL0_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${LEVEL0_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0
  namespace: ${LEVEL0_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: level0
  template:
    metadata:
      labels:
        app: level0
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ${LEVEL0_SA_NAME}
      containers:
        - name: level0
          image: ${ACR_LOGIN_SERVER}/level0:1774996103-d9cb85f7
          ports:
            - containerPort: 8080
          env:
            - name: Storage__Provider
              value: "CosmosDb"
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
            - name: CosmosDb__DatabaseName
              value: ${LEVEL0_COSMOS_DATABASE}
            - name: CosmosDb__ContainerName
              value: ${LEVEL0_COSMOS_CONTAINER}
            - name: AZURE_CLIENT_ID
              value: ${LEVEL0_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: AI__Endpoint
              value: ${AI_SERVICES_ENDPOINT}
            - name: AI__ModelName
              value: ${AI_MODEL_GPT41}
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0
  namespace: ${LEVEL0_NAMESPACE}
spec:
  selector:
    app: level0
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0-web
  namespace: ${LEVEL0_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: level0-web
  template:
    metadata:
      labels:
        app: level0-web
    spec:
      containers:
        - name: level0-web
          image: ${ACR_LOGIN_SERVER}/level0-web:1774996103-d9cb85f7
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_FALLBACK_PAGE
              value: /public/index.html
            - name: SERVER_LOG_LEVEL
              value: info
            - name: SERVER_CACHE_CONTROL_HEADERS
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0-web
  namespace: ${LEVEL0_NAMESPACE}
spec:
  selector:
    app: level0-web
  ports:
    - port: 8080
      targetPort: 8080
