apiVersion: v1
kind: Namespace
metadata:
  name: level0
  labels:
    istio.io/rev: asm-1-28
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: level0
  namespace: level0
  annotations:
    azure.workload.identity/client-id: ${LEVEL0_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0
  namespace: level0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: level0
  template:
    metadata:
      labels:
        app: level0
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: level0
      containers:
        - name: level0
          image: ${ACR_LOGIN_SERVER}/level0:latest # {"$imagepolicy": "flux-system:level0"}
          ports:
            - containerPort: 8080
          env:
            - name: Storage__Provider
              value: "CosmosDb"
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
            - name: CosmosDb__DatabaseName
              value: ${LEVEL0_COSMOS_DATABASE}
            - name: CosmosDb__ContainerName
              value: ${LEVEL0_COSMOS_CONTAINER}
            - name: AZURE_CLIENT_ID
              value: ${LEVEL0_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APP_INSIGHTS_CONNECTION_STRING}
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0
  namespace: level0
spec:
  selector:
    app: level0
  ports:
    - port: 8080
      targetPort: 8080
