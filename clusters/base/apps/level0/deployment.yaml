apiVersion: v1
kind: Namespace
metadata:
  name: ${LEVEL0_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${LEVEL0_SA_NAME}
  namespace: ${LEVEL0_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${LEVEL0_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0
  namespace: ${LEVEL0_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: level0
  template:
    metadata:
      labels:
        app: level0
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ${LEVEL0_SA_NAME}
      initContainers:
        - name: identity-check
          image: mcr.microsoft.com/azure-cli:latest
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              TOKEN_PATH="${AZURE_FEDERATED_TOKEN_FILE:-/var/run/secrets/azure/tokens/azure-identity-token}"
              errors=0
              echo "═══════════════════════════════════════════"
              echo "  Workload Identity Verifier"
              echo "═══════════════════════════════════════════"
              echo ""
              if [[ "${SKIP_IDENTITY_CHECK:-false}" == "true" ]]; then
                echo "⚠️  SKIP_IDENTITY_CHECK=true — skipping"
                exit 0
              fi
              echo "1. Projected Token"
              if [[ -f "$TOKEN_PATH" ]]; then
                TOKEN=$(cat "$TOKEN_PATH")
                echo "   ✅ Token file exists (${#TOKEN} bytes)"
              else
                echo "   ❌ Token NOT FOUND: $TOKEN_PATH"
                echo "   → Pod label 'azure.workload.identity/use: true' ?"
                echo "   → SA annotation 'azure.workload.identity/client-id' ?"
                errors=$((errors + 1)); TOKEN=""
              fi
              echo ""
              echo "2. JWT Claims"
              if [[ -n "${TOKEN:-}" ]]; then
                PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null || echo "")
                if [[ -n "$PAYLOAD" ]]; then
                  echo "   issuer:  $(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('iss','?'))" 2>/dev/null)"
                  echo "   subject: $(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sub','?'))" 2>/dev/null)"
                  echo "   ✅ Valid JWT"
                else
                  echo "   ❌ Cannot decode JWT"; errors=$((errors + 1))
                fi
              fi
              echo ""
              echo "3. Webhook Env Vars"
              for VAR in AZURE_CLIENT_ID AZURE_TENANT_ID; do
                if [[ -n "${!VAR:-}" ]]; then
                  echo "   ✅ $VAR = ${!VAR}"
                else
                  echo "   ❌ $VAR not set"; errors=$((errors + 1))
                fi
              done
              echo ""
              echo "4. OIDC Token Exchange"
              if [[ -n "${TOKEN:-}" ]] && [[ -n "${AZURE_CLIENT_ID:-}" ]] && [[ -n "${AZURE_TENANT_ID:-}" ]]; then
                RESP=$(curl -sS --max-time 10 \
                  "https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token" \
                  -d "grant_type=client_credentials&client_id=${AZURE_CLIENT_ID}&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=${TOKEN}&scope=https://management.azure.com/.default" 2>&1 || echo '{"error":"request_failed"}')
                if echo "$RESP" | python3 -c "import sys,json; assert 'access_token' in json.load(sys.stdin)" 2>/dev/null; then
                  echo "   ✅ Token exchange succeeded"
                else
                  ERR=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error_description', d.get('error','unknown')))" 2>/dev/null || echo "$RESP")
                  echo "   ❌ Token exchange FAILED: $ERR"
                  echo "   → Federated credential exists in Azure?"
                  echo "   → az identity federated-credential list --name <id> -g <rg>"
                  errors=$((errors + 1))
                fi
              else
                echo "   ⚠️  Skipped (missing prereqs)"
              fi
              echo ""
              echo "5. Cosmos DB Connectivity"
              if [[ -n "${CosmosDb__Endpoint:-}" ]]; then
                HTTP=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "${CosmosDb__Endpoint}" 2>/dev/null || echo "000")
                if [[ "$HTTP" == "401" || "$HTTP" == "200" ]]; then
                  echo "   ✅ Reachable (HTTP $HTTP)"
                else
                  echo "   ❌ Unreachable (HTTP $HTTP): ${CosmosDb__Endpoint}"
                  errors=$((errors + 1))
                fi
              else
                echo "   ⚠️  CosmosDb__Endpoint not set"
              fi
              echo ""
              echo "═══════════════════════════════════════════"
              if [[ $errors -eq 0 ]]; then
                echo "  ✅ All checks passed"
              else
                echo "  ❌ $errors check(s) failed"
              fi
              echo "═══════════════════════════════════════════"
              exit $errors
          env:
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: level0
          image: ${ACR_LOGIN_SERVER}/level0:latest # {"$imagepolicy": "flux-system:level0"}
          ports:
            - containerPort: 8080
          env:
            - name: Storage__Provider
              value: "CosmosDb"
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
            - name: CosmosDb__DatabaseName
              value: ${LEVEL0_COSMOS_DATABASE}
            - name: CosmosDb__ContainerName
              value: ${LEVEL0_COSMOS_CONTAINER}
            - name: AZURE_CLIENT_ID
              value: ${LEVEL0_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APP_INSIGHTS_CONNECTION_STRING}
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0
  namespace: ${LEVEL0_NAMESPACE}
spec:
  selector:
    app: level0
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: level0-web
  namespace: ${LEVEL0_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: level0-web
  template:
    metadata:
      labels:
        app: level0-web
    spec:
      containers:
        - name: level0-web
          image: ${ACR_LOGIN_SERVER}/level0-web:latest # {"$imagepolicy": "flux-system:level0-web"}
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_FALLBACK_PAGE
              value: /public/index.html
            - name: SERVER_LOG_LEVEL
              value: info
            - name: SERVER_HEALTH
              value: "true"
            - name: SERVER_CACHE_CONTROL_HEADERS
              value: "${LEVEL0_CACHE_CONTROL}"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: level0-web
  namespace: ${LEVEL0_NAMESPACE}
spec:
  selector:
    app: level0-web
  ports:
    - port: 8080
      targetPort: 8080
