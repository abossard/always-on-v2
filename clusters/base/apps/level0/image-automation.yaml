apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: level0
  namespace: flux-system
spec:
  image: ${ACR_LOGIN_SERVER}/level0
  interval: 1m
  provider: azure
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: level0-web
  namespace: flux-system
spec:
  image: ${ACR_LOGIN_SERVER}/level0-web
  interval: 1m
  provider: azure
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: level0
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: level0
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]{8}$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: level0-web
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: level0-web
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]{8}$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: level0
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: cluster-config
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: Flux Image Automation
        email: flux@alwayson.actor
      messageTemplate: "chore: update level0 images {{range .Changed.Changes}}{{println .NewValue}}{{end}}"
    push:
      branch: main
  update:
    path: ./clusters/base/apps/level0
    strategy: Setters
