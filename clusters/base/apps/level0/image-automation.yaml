apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: level0
  namespace: flux-system
spec:
  image: ${ACR_LOGIN_SERVER}/level0
  interval: 1m
  provider: azure
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: level0-web
  namespace: flux-system
spec:
  image: ${ACR_LOGIN_SERVER}/level0-web
  interval: 1m
  provider: azure
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: level0
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: level0
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]{8}$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: level0-web
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: level0-web
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]{8}$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
# ImageUpdateAutomation removed — CI pipeline commits image tag updates instead.
# See ADR-0046 for rationale (multi-cluster safety, no Git write access needed).
# ImageRepository + ImagePolicy kept for visibility into available tags.
