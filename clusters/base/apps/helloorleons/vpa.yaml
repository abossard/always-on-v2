apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: helloorleons-vpa
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helloorleons
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: helloorleons
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          memory: 2Gi
        controlledResources: ["memory"]
