apiVersion: v1
kind: Namespace
metadata:
  name: ${HELLOORLEONS_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${HELLOORLEONS_SA_NAME}
  namespace: ${HELLOORLEONS_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloorleons
  template:
    metadata:
      labels:
        app: helloorleons
        azure.workload.identity/use: "true"
        orleans/serviceId: helloorleons
        orleans/clusterId: helloorleons
    spec:
      serviceAccountName: ${HELLOORLEONS_SA_NAME}
      containers:
        - name: helloorleons
          image: ${ACR_LOGIN_SERVER}/helloorleons:1775692160-83ebea3f
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: silo
            - containerPort: 30000
              name: gateway
          env:
            - name: AZURE_CLIENT_ID
              value: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: OTEL_SERVICE_NAME
              value: helloorleons
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=${STAMP_NAME},cloud.region=${REGION},stamp=${STAMP_KEY}
            - name: OTEL_TRACES_SAMPLER
              value: "${OTEL_TRACES_SAMPLER}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "${OTEL_TRACES_SAMPLER_ARG}"
            - name: AI__Endpoint
              value: ${AI_SERVICES_ENDPOINT}
            - name: AI__ModelName
              value: ${AI_MODEL_GPT41}
            - name: ORLEANS_CLUSTERING
              value: "Kubernetes"
            - name: ConnectionStrings__cosmos
              value: "AccountEndpoint=${COSMOS_ENDPOINT}"
            - name: Orleans__Clustering__ProviderType
              value: "AzureCosmosDB"
            - name: Orleans__Clustering__ServiceKey
              value: "cosmos"
            - name: Orleans__Clustering__DatabaseName
              value: ${HELLOORLEONS_COSMOS_DATABASE}
            - name: Orleans__Clustering__ContainerName
              value: "OrleansCluster"
            - name: Orleans__GrainStorage__Default__ProviderType
              value: "AzureCosmosDB"
            - name: Orleans__GrainStorage__Default__ServiceKey
              value: "cosmos"
            - name: Orleans__GrainStorage__Default__DatabaseName
              value: ${HELLOORLEONS_COSMOS_DATABASE}
            - name: Orleans__GrainStorage__Default__ContainerName
              value: ${HELLOORLEONS_COSMOS_CONTAINER}
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  selector:
    app: helloorleons
  ports:
    - port: 8080
      targetPort: 8080
