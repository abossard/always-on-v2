apiVersion: v1
kind: Namespace
metadata:
  name: ${HELLOORLEONS_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${HELLOORLEONS_SA_NAME}
  namespace: ${HELLOORLEONS_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helloorleons
  template:
    metadata:
      labels:
        app: helloorleons
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ${HELLOORLEONS_SA_NAME}
      containers:
        - name: helloorleons
          image: ${ACR_LOGIN_SERVER}/helloorleons:1773608738-f7b17211
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_CLIENT_ID
              value: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: DISTRIBUTED_TRACING_ENABLED
              value: ${DISTRIBUTED_TRACING_ENABLED}
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  selector:
    app: helloorleons
  ports:
    - port: 8080
      targetPort: 8080
