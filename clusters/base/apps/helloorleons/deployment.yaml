apiVersion: v1
kind: Namespace
metadata:
  name: ${HELLOORLEONS_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${HELLOORLEONS_SA_NAME}
  namespace: ${HELLOORLEONS_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloorleons
  template:
    metadata:
      labels:
        app: helloorleons
        azure.workload.identity/use: "true"
        orleans/serviceId: helloorleons
        orleans/clusterId: helloorleons
    spec:
      serviceAccountName: ${HELLOORLEONS_SA_NAME}
      containers:
        - name: helloorleons
          image: ${ACR_LOGIN_SERVER}/helloorleons:1773648618-d4afd05f
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: silo
            - containerPort: 30000
              name: gateway
          env:
            - name: AZURE_CLIENT_ID
              value: ${HELLOORLEONS_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: DISTRIBUTED_TRACING_ENABLED
              value: ${DISTRIBUTED_TRACING_ENABLED}
            - name: ORLEANS_CLUSTERING
              value: "Redis"
            - name: Redis__ConnectionString
              value: "redis:6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: helloorleons
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  selector:
    app: helloorleons
  ports:
    - port: 8080
      targetPort: 8080
