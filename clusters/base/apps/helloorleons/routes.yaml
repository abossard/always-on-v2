apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helloorleons-http-redirect
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  parentRefs:
    - name: app-gateway
      namespace: aks-istio-ingress
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helloorleons-api-route
  namespace: ${HELLOORLEONS_NAMESPACE}
spec:
  parentRefs:
    - name: app-gateway
      namespace: aks-istio-ingress
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hello
      backendRefs:
        - name: helloorleons
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: helloorleons
          port: 8080
