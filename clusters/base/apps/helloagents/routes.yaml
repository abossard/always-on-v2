apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helloagents-http-redirect
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  parentRefs:
    - name: agents-gateway
      namespace: aks-istio-ingress
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helloagents-api-route
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  parentRefs:
    - name: agents-gateway
      namespace: aks-istio-ingress
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: helloagents
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: helloagents
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /dashboard
      backendRefs:
        - name: helloagents
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: helloagents-web
          port: 8080
