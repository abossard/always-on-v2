apiVersion: v1
kind: Namespace
metadata:
  name: ${HELLOAGENTS_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${HELLOAGENTS_SA_NAME}
  namespace: ${HELLOAGENTS_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${HELLOAGENTS_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloagents
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloagents
  template:
    metadata:
      labels:
        app: helloagents
        azure.workload.identity/use: "true"
        orleans/serviceId: helloagents
        orleans/clusterId: helloagents
    spec:
      serviceAccountName: ${HELLOAGENTS_SA_NAME}
      containers:
        - name: helloagents
          image: ${ACR_LOGIN_SERVER}/helloagents:1773987948-d1eebb44
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: silo
            - containerPort: 30000
              name: gateway
          env:
            - name: AZURE_CLIENT_ID
              value: ${HELLOAGENTS_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: DISTRIBUTED_TRACING_ENABLED
              value: ${DISTRIBUTED_TRACING_ENABLED}
            - name: AZURE_OPENAI_ENDPOINT
              value: ${AI_SERVICES_ENDPOINT}
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: ${AI_MODEL_GPT41_MINI}
            - name: Storage__Provider
              value: "CosmosDb"
            - name: CosmosDb__DatabaseName
              value: ${HELLOAGENTS_COSMOS_DATABASE}
            - name: CosmosDb__ContainerName
              value: ${HELLOAGENTS_COSMOS_CONTAINER}
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
            - name: ORLEANS_CLUSTERING
              value: "Redis"
            - name: Redis__ConnectionString
              value: "redis:6379"
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: helloagents
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  selector:
    app: helloagents
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloagents-web
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloagents-web
  template:
    metadata:
      labels:
        app: helloagents-web
    spec:
      containers:
        - name: helloagents-web
          image: ${ACR_LOGIN_SERVER}/helloagents-web:1773987948-d1eebb44
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AGENT_API_URL
              value: "http://helloagents:8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: helloagents-web
  namespace: ${HELLOAGENTS_NAMESPACE}
spec:
  selector:
    app: helloagents-web
  ports:
    - port: 8080
      targetPort: 8080
