apiVersion: v1
kind: Namespace
metadata:
  name: ${DARKUX_NAMESPACE}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${DARKUX_SA_NAME}
  namespace: ${DARKUX_NAMESPACE}
  annotations:
    azure.workload.identity/client-id: ${DARKUX_IDENTITY_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkux
  namespace: ${DARKUX_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: darkux
  template:
    metadata:
      labels:
        app: darkux
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ${DARKUX_SA_NAME}
      containers:
        - name: darkux
          image: ${ACR_LOGIN_SERVER}/darkux:1775257399-c783c679
          ports:
            - containerPort: 8080
          env:
            - name: Storage__Provider
              value: "CosmosDb"
            - name: CosmosDb__Endpoint
              value: ${COSMOS_ENDPOINT}
            - name: CosmosDb__DatabaseName
              value: ${DARKUX_COSMOS_DATABASE}
            - name: CosmosDb__ContainerName
              value: ${DARKUX_COSMOS_CONTAINER}
            - name: AZURE_CLIENT_ID
              value: ${DARKUX_IDENTITY_CLIENT_ID}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
            - name: OTEL_SERVICE_NAME
              value: darkux
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=${STAMP_NAME},cloud.region=${REGION},stamp=${STAMP_KEY}
            - name: OTEL_TRACES_SAMPLER
              value: "${OTEL_TRACES_SAMPLER}"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "${OTEL_TRACES_SAMPLER_ARG}"
            - name: AI__Endpoint
              value: ${AI_SERVICES_ENDPOINT}
            - name: AI__ModelName
              value: ${AI_MODEL_GPT41}
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: darkux
  namespace: ${DARKUX_NAMESPACE}
spec:
  selector:
    app: darkux
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkux-web
  namespace: ${DARKUX_NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: darkux-web
  template:
    metadata:
      labels:
        app: darkux-web
    spec:
      containers:
        - name: darkux-web
          image: ${ACR_LOGIN_SERVER}/darkux-web:1775257399-c783c679
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_FALLBACK_PAGE
              value: /public/index.html
            - name: SERVER_LOG_LEVEL
              value: info
            - name: SERVER_CACHE_CONTROL_HEADERS
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: darkux-web
  namespace: ${DARKUX_NAMESPACE}
spec:
  selector:
    app: darkux-web
  ports:
    - port: 8080
      targetPort: 8080
