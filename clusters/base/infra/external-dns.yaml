apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-dns
  install:
    createNamespace: true
  chart:
    spec:
      chart: external-dns
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: external-dns
  values:
    provider:
      name: azure
    sources:
      - gateway-httproute
    domainFilters:
      - ${DNS_ZONE_NAME}
    policy: upsert-only
    txtOwnerId: ${STAMP_NAME}
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: ${DNS_IDENTITY_CLIENT_ID}
    podLabels:
      azure.workload.identity/use: "true"
    extraArgs:
      - --azure-config-file=""
    env:
      - name: AZURE_TENANT_ID
        value: ${AZURE_TENANT_ID}
      - name: AZURE_SUBSCRIPTION_ID
        value: ${AZURE_SUBSCRIPTION_ID}
      - name: AZURE_RESOURCE_GROUP
        value: ${DNS_ZONE_RESOURCE_GROUP}
