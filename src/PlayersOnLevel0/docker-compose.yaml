services:
  api:
    build:
      context: .
      dockerfile: PlayersOnLevel0.Api/Dockerfile
    ports:
      - "5036:8080"
    environment:
      - Storage__Provider=InMemory
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  web:
    build:
      context: PlayersOnLevel0.SPA.Web
      dockerfile: Dockerfile
    ports:
      - "5173:8080"
    environment:
      - SERVER_ROOT=/public
      - SERVER_PORT=8080
      - SERVER_FALLBACK_PAGE=/public/index.html
      - SERVER_LOG_LEVEL=info
      - SERVER_HEALTH=true
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  e2e:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /e2e
    volumes:
      - ./PlayersOnLevel0.E2E:/e2e
    environment:
      - services__web__http__0=http://web:8080
      - CI=true
    command: >
      bash -c "npm ci && npx playwright test"
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - e2e
